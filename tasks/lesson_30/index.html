<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30. Document Object Model (DOM)</title>
    <link rel="stylesheet" href="./css/main.css">
</head>

<body class="body__layout">
    <div class="container">
        <a href="../../index.html" class="btn__back">Back to home</a>
        <h1 class="title_1">30. DOM</h1>
        <section class="section">
            <h2 class="title_2">tasks</h2>
            <div class="task">
                <h3 class="title_3">1. Playlist</h3>
                <ul class="playlist" id="playlist-list"></ul>
            </div>
            <div class="task">
                <h3 class="title_3">2. Modal Window</h3>
                <button class="btn" onclick="openModal()">Open Modal</button>
            </div>
            <div class="task">
                <h3 class="title_3">3. Traffic Light</h3>
                <div class="traffic-light-container">
                    <div class="traffic-light">
                        <div class="light light--red active" id="light-red"></div>
                        <div class="light light--yellow" id="light-yellow"></div>
                        <div class="light light--green" id="light-green"></div>
                    </div>
                    <button class="btn" onclick="nextLight()">Switch Color</button>
                </div>
            </div>
        </section>
    </div>
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <p class="modal-box__text">Hello! This is a simple modal window. You can close it by clicking the button
                below or clicking outside of this box.</p>
            <button class="btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="./js/main.js"></script>
</body>

</html>
