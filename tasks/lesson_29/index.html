<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>29. Arrays</title>
    <link rel="stylesheet" href="./css/main.css">
</head>

<body class="body__layout">
    <div class="container">
        <a href="../../index.html" class="btn__back">Back to home</a>
        <h1 class="title_1">29. Arrays</h1>
        <section class="section">
            <h2 class="title_2">tasks</h2>
            <div class="task">
                <h3 class="title_3">Display shopping list</h3>
                <button class="btn" onclick="runDisplayList()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Purchase a product</h3>
                <button class="btn" onclick="runPurchaseProduct()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Delete a product</h3>
                <button class="btn" onclick="runDeleteProduct()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Add a purchase</h3>
                <button class="btn" onclick="runAddProduct()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Calculate total sum</h3>
                <button class="btn" onclick="runCalculateTotalSum()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Calculate sum by purchase status</h3>
                <button class="btn" onclick="runCalculateFilteredSum()">Run</button>
            </div>
        </section>
    </div>

    <script src="./js/main.js"></script>
</body>

</html>
