<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>28. Objects</title>
    <link rel="stylesheet" href="./css/main.css">
</head>

<body class="body__layout">
    <div class="container">
        <a href="../../index.html" class="btn__back">Back to home</a>
        <h1 class="title_1">28. Objects</h1>
        <section class="section">
            <h2 class="title_2">tasks</h2>
            <div class="task">
                <h3 class="title_3">Show car information</h3>
                <button class="btn" onclick="runShowCarInfo()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Add driver to car</h3>
                <button class="btn" onclick="runAddDriver()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Check driver in list</h3>
                <button class="btn" onclick="runCheckDriver()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Calculate travel time and fuel</h3>
                <button class="btn" onclick="runCalculateTravel()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Display time</h3>
                <button class="btn" onclick="runDisplayTime()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Add seconds to time</h3>
                <button class="btn" onclick="runAddSeconds()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Add minutes to time</h3>
                <button class="btn" onclick="runAddMinutes()">Run</button>
            </div>
            <div class="task">
                <h3 class="title_3">Add hours to time</h3>
                <button class="btn" onclick="runAddHours()">Run</button>
            </div>
        </section>
    </div>

    <script src="./js/main.js"></script>
</body>

</html>
